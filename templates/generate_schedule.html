<!DOCTYPE html>
<html>
<head>
    <title>Generate Schedule - TableStack</title>
</head>
<body style="margin:0; font-family:Arial; background:#0a0a0a; color:white;">
    <header style="background:#111827; padding:24px 40px;">
        <h1 style="color:#00ff41;">Generate Schedule</h1>
        <p><a style="color:#00ff41;" href="{{ url_for('index') }}">← Dashboard</a></p>
    </header>

    <main style="padding:40px;">
        <form method="POST" style="background:#111827; padding:28px; max-width:500px; border-radius:16px;">
            <label>Week Starting Monday</label><br>
            <input type="date" name="week_start" required style="width:100%; padding:12px; margin-top:8px;"><br>

            <button type="submit" style="margin-top:24px; background:#00ff41; color:#050505; border:none; padding:12px 18px; border-radius:8px; font-weight:bold;">
                Generate Schedule
            </button>
        </form>
    </main>
</body>
</html>
