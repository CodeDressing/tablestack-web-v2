<!DOCTYPE html>
<html>
<head>
    <title>Employees - TableStack</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #f4f4f4;
        }

        header {
            background: #111827;
            padding: 24px 40px;
            border-bottom: 1px solid #1f2937;
        }

        h1 {
            margin: 0;
            color: #00ff41;
        }

        main {
            padding: 40px;
        }

        a {
            color: #00ff41;
            text-decoration: none;
            font-weight: bold;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .button {
            background: #00ff41;
            color: #050505;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #111827;
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 12px 14px;
            border-bottom: 1px solid #1f2937;
            text-align: left;
        }

        th {
            color: #00ff41;
            background: #0f172a;
        }

        button {
            background: #ef4444;
            color: white;
            border: none;
            padding: 7px 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .edit {
            color: #38bdf8;
            margin-right: 12px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Employees</h1>
        <p><a href="{{ url_for('index') }}">← Dashboard</a></p>
    </header>

    <main>
        <div class="topbar">
            <h2>Employee Roster</h2>
            <a class="button" href="{{ url_for('add_employee') }}">+ Add Employee</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Type</th>
                    <th>Target Hours</th>
                    <th>Rate</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
                {% for emp in employees %}
                <tr>
                    <td>{{ emp.name }}</td>
                    <td>{{ emp.role }}</td>
                    <td>{{ emp.employment_type }}</td>
                    <td>{{ emp.weekly_hours_target }}</td>
                    <td>${{ "%.2f"|format(emp.hourly_rate) }}</td>
                    <td>
                        <a class="edit" href="{{ url_for('edit_employee', id=emp.id) }}">Edit</a>

                        <form method="POST" action="{{ url_for('delete_employee', id=emp.id) }}" style="display:inline;">
                            <button type="submit" onclick="return confirm('Delete {{ emp.name }}?')">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>
</body>
</html>
