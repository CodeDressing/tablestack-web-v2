<!DOCTYPE html>
<html>
<head>
    <title>{{ mode }} Employee - TableStack</title>
</head>
<body style="margin:0; font-family:Arial; background:#0a0a0a; color:white;">
    <header style="background:#111827; padding:24px 40px;">
        <h1 style="color:#00ff41;">{{ mode }} Employee</h1>
        <p><a style="color:#00ff41;" href="{{ url_for('employees') }}">← Back to Employees</a></p>
    </header>

    <main style="padding:40px;">
        <form method="POST" style="background:#111827; padding:28px; max-width:900px; border-radius:16px;">
            <h2 style="color:#00ff41;">Basic Info</h2>

            <label>Name</label><br>
            <input name="name" required value="{{ employee.name if employee else '' }}" style="width:100%; padding:12px; margin-bottom:14px;"><br>

            <label>Role</label><br>
            <select name="role" style="width:100%; padding:12px; margin-bottom:14px;">
                {% set current_role = employee.role if employee else 'Server' %}
                {% for role in roles %}
                    <option value="{{ role }}" {% if current_role == role %}selected{% endif %}>{{ role }}</option>
                {% endfor %}
            </select><br>

            <label>Employment Type</label><br>
            <select name="employment_type" style="width:100%; padding:12px; margin-bottom:14px;">
                {% set current_type = employee.employment_type if employee else 'Part Time' %}
                <option value="Part Time" {% if current_type == 'Part Time' %}selected{% endif %}>Part Time</option>
                <option value="Full Time" {% if current_type == 'Full Time' %}selected{% endif %}>Full Time</option>
            </select><br>

            <label>Target Hours</label><br>
            <input type="number" step="0.5" name="weekly_hours_target" value="{{ employee.weekly_hours_target if employee else 20 }}" style="width:100%; padding:12px; margin-bottom:14px;"><br>

            <label>Hourly Rate</label><br>
            <input type="number" step="0.5" name="hourly_rate" value="{{ employee.hourly_rate if employee else 15 }}" style="width:100%; padding:12px; margin-bottom:24px;"><br>

            <h2 style="color:#00ff41;">Availability</h2>
            <p style="color:#9ca3af;">Choose which shifts this employee can work each day.</p>

            <table style="width:100%; border-collapse:collapse; margin-bottom:30px;">
                <thead>
                    <tr style="color:#00ff41;">
                        <th style="text-align:left; padding:10px;">Day</th>
                        <th style="text-align:left; padding:10px;">Availability</th>
                        <th style="text-align:left; padding:10px;">Custom Start</th>
                        <th style="text-align:left; padding:10px;">Custom End</th>
                    </tr>
                </thead>

                <tbody>
                    {% for day in days %}
                    {% set custom = custom_times.get(day, {}) %}
                    <tr>
                        <td style="padding:10px;">{{ day }}</td>

                        <td style="padding:10px;">
                            <select name="availability_{{ day }}" style="padding:10px; width:160px;">
                                {% for option in availability_options %}
                                    <option value="{{ option }}" {% if availability.get(day, 'Both') == option %}selected{% endif %}>
                                        {{ option }}
                                    </option>
                                {% endfor %}
                            </select>
                        </td>

                        <td style="padding:10px;">
                            <input type="time" name="custom_start_{{ day }}" value="{{ custom.get('start', '') }}" style="padding:10px;">
                        </td>

                        <td style="padding:10px;">
                            <input type="time" name="custom_end_{{ day }}" value="{{ custom.get('end', '') }}" style="padding:10px;">
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <button type="submit" style="background:#00ff41; color:#050505; border:none; padding:12px 18px; border-radius:8px; font-weight:bold;">
                {{ mode }} Employee
            </button>
        </form>
    </main>
</body>
</html>
