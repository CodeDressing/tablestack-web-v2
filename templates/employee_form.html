<!DOCTYPE html>
<html>
<head>
    <title>{{ mode }} Employee - TableStack</title>
</head>
<body style="margin:0; font-family:Arial; background:#0a0a0a; color:white;">
    <header style="background:#111827; padding:24px 40px;">
        <h1 style="color:#00ff41;">{{ mode }} Employee</h1>
        <p><a style="color:#00ff41;" href="{{ url_for('employees') }}">← Back to Employees</a></p>
    </header>

    <main style="padding:40px;">
        <form method="POST" style="background:#111827; padding:28px; max-width:560px; border-radius:16px;">
            <label>Name</label><br>
            <input name="name" required value="{{ employee.name if employee else '' }}" style="width:100%; padding:12px; margin-bottom:14px;"><br>

            <label>Role</label><br>
            <select name="role" style="width:100%; padding:12px; margin-bottom:14px;">
                {% set current_role = employee.role if employee else 'Server' %}
                {% for role in ['Server', 'Bartender', 'Barback', 'Runner', 'Backwaiter', 'Expo', 'Food Expeditor', 'Host', 'Manager', 'Owner'] %}
                    <option value="{{ role }}" {% if current_role == role %}selected{% endif %}>{{ role }}</option>
                {% endfor %}
            </select><br>

            <label>Employment Type</label><br>
            <select name="employment_type" style="width:100%; padding:12px; margin-bottom:14px;">
                {% set current_type = employee.employment_type if employee else 'Part Time' %}
                <option value="Part Time" {% if current_type == 'Part Time' %}selected{% endif %}>Part Time</option>
                <option value="Full Time" {% if current_type == 'Full Time' %}selected{% endif %}>Full Time</option>
            </select><br>

            <label>Target Hours</label><br>
            <input type="number" step="0.5" name="weekly_hours_target" value="{{ employee.weekly_hours_target if employee else 20 }}" style="width:100%; padding:12px; margin-bottom:14px;"><br>

            <label>Hourly Rate</label><br>
            <input type="number" step="0.5" name="hourly_rate" value="{{ employee.hourly_rate if employee else 15 }}" style="width:100%; padding:12px; margin-bottom:14px;"><br>

            <button type="submit" style="background:#00ff41; color:#050505; border:none; padding:12px 18px; border-radius:8px; font-weight:bold;">
                {{ mode }} Employee
            </button>
        </form>
    </main>
</body>
</html>
